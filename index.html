<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IN999 - Game SSM Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #f8c233;
    --gold-dark: #d4a017;
    --gold-light: #ffe07a;
    --dark: #0a0a0f;
    --dark2: #111118;
    --dark3: #1a1a24;
    --dark4: #242433;
    --green: #00e676;
    --red: #ff1744;
    --blue: #00b0ff;
    --text: #e8e8f0;
    --text-dim: #7a7a9a;
    --border: rgba(248,194,51,0.15);
    --glow: 0 0 20px rgba(248,194,51,0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--dark);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(248,194,51,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%, rgba(248,194,51,0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── NAV ── */
  nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
  }

  .nav-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-badge {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--gold), var(--gold-dark));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    color: #0a0a0f;
    box-shadow: var(--glow);
  }

  .logo-text {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 2px;
  }

  .nav-links {
    display: flex;
    gap: 8px;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 14px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 6px;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .nav-links a:hover { color: var(--gold); background: rgba(248,194,51,0.08); }

  .nav-btns { display: flex; gap: 10px; }

  .btn-login {
    padding: 8px 20px;
    border: 1.5px solid var(--gold);
    border-radius: 20px;
    background: transparent;
    color: var(--gold);
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .btn-login:hover { background: rgba(248,194,51,0.1); }

  .btn-register {
    padding: 8px 20px;
    border: none;
    border-radius: 20px;
    background: linear-gradient(90deg, #1a1a00, var(--gold));
    color: #0a0a0f;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.5px;
    box-shadow: 0 2px 12px rgba(248,194,51,0.3);
  }

  .btn-register:hover { transform: translateY(-1px); box-shadow: 0 4px 20px rgba(248,194,51,0.5); }

  /* ── HERO ── */
  .hero {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 60px 24px 40px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 48px;
    align-items: center;
  }

  .hero-label {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(248,194,51,0.1);
    border: 1px solid rgba(248,194,51,0.3);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  .hero-label::before { content: '●'; color: var(--green); font-size: 8px; animation: pulse 2s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .hero h1 {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(36px, 5vw, 60px);
    font-weight: 700;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 16px;
  }

  .hero h1 span { color: var(--gold); }

  .hero p {
    color: var(--text-dim);
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 32px;
    max-width: 440px;
  }

  .hero-btns { display: flex; gap: 14px; flex-wrap: wrap; }

  .hero-btn-primary {
    padding: 14px 32px;
    border: none;
    border-radius: 8px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    color: #0a0a0f;
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
    box-shadow: 0 4px 20px rgba(248,194,51,0.4);
  }

  .hero-btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(248,194,51,0.5); }

  .hero-btn-secondary {
    padding: 14px 32px;
    border: 1.5px solid rgba(248,194,51,0.4);
    border-radius: 8px;
    background: rgba(248,194,51,0.05);
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .hero-btn-secondary:hover { background: rgba(248,194,51,0.1); }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 24px;
    margin-top: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .stat { text-align: left; }
  .stat-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--gold);
  }
  .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

  /* Hero visual */
  .hero-visual {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hero-card {
    width: 100%;
    max-width: 380px;
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), var(--glow);
    position: relative;
    overflow: hidden;
  }

  .hero-card::before {
    content: '';
    position: absolute;
    top: -1px; left: 30px; right: 30px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    border-radius: 2px;
  }

  .bonus-display {
    text-align: center;
    padding: 24px 0 20px;
  }

  .bonus-amount {
    font-family: 'Rajdhani', sans-serif;
    font-size: 52px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 30px rgba(248,194,51,0.5);
    line-height: 1;
  }

  .bonus-label {
    font-size: 13px;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-top: 6px;
  }

  .mini-games {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 20px;
  }

  .mini-game {
    background: var(--dark4);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 12px 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .mini-game:hover { border-color: rgba(248,194,51,0.3); background: rgba(248,194,51,0.05); }

  .mini-game-icon { font-size: 24px; margin-bottom: 4px; }
  .mini-game-name { font-size: 10px; font-weight: 600; color: var(--text-dim); letter-spacing: 0.5px; }

  /* ── SECTION ── */
  .section {
    position: relative;
    z-index: 1;
    max-width: 1280px;
    margin: 0 auto;
    padding: 48px 24px;
  }

  .section-header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .section-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 28px;
    font-weight: 700;
    color: #fff;
  }

  .section-title span { color: var(--gold); }

  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 0 24px;
  }

  /* ── BONUS OFFERS ── */
  .bonus-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 16px;
  }

  .bonus-card {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .bonus-card:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

  .bonus-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(248,194,51,0.04) 0%, transparent 60%);
    pointer-events: none;
  }

  .bonus-card-tag {
    display: inline-block;
    background: rgba(248,194,51,0.15);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 10px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .bonus-card-tag.green { background: rgba(0,230,118,0.15); color: var(--green); }
  .bonus-card-tag.blue { background: rgba(0,176,255,0.15); color: var(--blue); }

  .bonus-card h3 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .bonus-card p { font-size: 14px; color: var(--text-dim); line-height: 1.6; margin-bottom: 18px; }

  .bonus-big-num {
    font-family: 'Rajdhani', sans-serif;
    font-size: 40px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    margin-bottom: 4px;
  }

  .bonus-big-num.green { color: var(--green); }

  .claim-btn {
    display: inline-block;
    padding: 9px 22px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    color: #0a0a0f;
    border: none;
    border-radius: 20px;
    font-family: 'Exo 2', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }

  .claim-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(248,194,51,0.4); }

  /* ── GAME CARDS ── */
  .games-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px;
  }

  .game-card {
    background: var(--dark2);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px;
    overflow: hidden;
    transition: all 0.25s;
    cursor: pointer;
    position: relative;
  }

  .game-card:hover { transform: translateY(-4px); border-color: rgba(248,194,51,0.3); box-shadow: 0 12px 40px rgba(0,0,0,0.5); }

  .game-card-img {
    width: 100%;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    position: relative;
    overflow: hidden;
  }

  .game-card-img::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 50px;
    background: linear-gradient(to bottom, transparent, var(--dark2));
  }

  .bg1 { background: linear-gradient(135deg, #1a0a2e, #2d0a3e); }
  .bg2 { background: linear-gradient(135deg, #0a1a0f, #0a2d14); }
  .bg3 { background: linear-gradient(135deg, #1a100a, #2d1a0a); }
  .bg4 { background: linear-gradient(135deg, #0a0f1a, #0a142d); }
  .bg5 { background: linear-gradient(135deg, #1a0a0a, #2d0a0a); }
  .bg6 { background: linear-gradient(135deg, #0f1a0a, #1a2d0a); }

  .game-card-info { padding: 14px 16px 16px; }

  .game-card-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }

  .game-card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 10px;
  }

  .game-players { font-size: 12px; color: var(--text-dim); }
  .game-players span { color: var(--green); font-weight: 600; }

  .play-btn {
    padding: 5px 14px;
    background: rgba(248,194,51,0.12);
    border: 1px solid rgba(248,194,51,0.3);
    border-radius: 12px;
    color: var(--gold);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }

  .play-btn:hover { background: var(--gold); color: #0a0a0f; }

  .game-badge {
    position: absolute;
    top: 10px; left: 10px;
    background: var(--red);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 8px;
    letter-spacing: 0.5px;
    z-index: 2;
  }

  .game-badge.new { background: var(--green); color: #0a0a0f; }
  .game-badge.hot { background: #ff6b00; }

  /* ── PAYMENT SECTION ── */
  .payment-section {
    position: relative;
    z-index: 1;
    background: var(--dark2);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    margin: 0;
    padding: 56px 24px;
  }

  .payment-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 60px;
    align-items: start;
  }

  .payment-info h2 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 36px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 14px;
  }

  .payment-info h2 span { color: var(--gold); }
  .payment-info p { color: var(--text-dim); font-size: 16px; line-height: 1.7; margin-bottom: 28px; }

  .payment-features { display: flex; flex-direction: column; gap: 14px; }

  .payment-feature {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    transition: border-color 0.2s;
  }

  .payment-feature:hover { border-color: rgba(248,194,51,0.2); }

  .pf-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    background: rgba(248,194,51,0.1);
  }

  .pf-text h4 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 2px; }
  .pf-text p { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

  /* Payment Form */
  .payment-form-wrap {
    background: var(--dark3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    position: relative;
    overflow: hidden;
  }

  .payment-form-wrap::before {
    content: '';
    position: absolute;
    top: -1px; left: 30px; right: 30px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .form-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .form-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }

  /* Amount selector */
  .amount-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 20px;
  }

  .amt-btn {
    padding: 10px 6px;
    background: var(--dark4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .amt-btn:hover, .amt-btn.active {
    border-color: var(--gold);
    background: rgba(248,194,51,0.08);
    color: var(--gold);
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .form-group input {
    width: 100%;
    background: var(--dark4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    transition: border-color 0.2s;
    outline: none;
  }

  .form-group input:focus { border-color: rgba(248,194,51,0.5); }
  .form-group input::placeholder { color: var(--text-dim); }

  .methods-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .method-btn {
    flex: 1;
    padding: 10px 8px;
    background: var(--dark4);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 8px;
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .method-btn:hover, .method-btn.active {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(248,194,51,0.06);
  }

  .method-btn .micon { font-size: 20px; margin-bottom: 4px; display: block; }

  .deposit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(90deg, var(--gold-dark), var(--gold));
    border: none;
    border-radius: 10px;
    color: #0a0a0f;
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
    box-shadow: 0 4px 20px rgba(248,194,51,0.3);
    margin-top: 8px;
  }

  .deposit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(248,194,51,0.5); }

  .secure-note {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(0,230,118,0.05);
    border: 1px solid rgba(0,230,118,0.15);
    border-radius: 8px;
    font-size: 12px;
    color: var(--green);
  }

  /* ── TICKER ── */
  .ticker-wrap {
    background: rgba(248,194,51,0.06);
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    padding: 10px 0;
  }

  .ticker-track {
    display: flex;
    gap: 48px;
    animation: ticker 25s linear infinite;
    white-space: nowrap;
  }

  @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .ticker-user { color: var(--gold); }
  .ticker-amt { color: var(--green); }
  .ticker-sep { color: var(--text-dim); }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 1;
    background: var(--dark2);
    border-top: 1px solid var(--border);
    padding: 40px 24px 20px;
  }

  .footer-inner {
    max-width: 1280px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr;
    gap: 40px;
    margin-bottom: 32px;
  }

  .footer-brand p { font-size: 14px; color: var(--text-dim); line-height: 1.7; margin-top: 14px; max-width: 300px; }

  .footer-col h4 {
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 10px; }

  .footer-col ul li a {
    color: var(--text-dim);
    text-decoration: none;
    font-size: 14px;
    transition: color 0.2s;
  }

  .footer-col ul li a:hover { color: var(--gold); }

  .footer-bottom {
    border-top: 1px solid var(--border);
    padding-top: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
